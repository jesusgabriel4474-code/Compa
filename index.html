<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>P2P Conexão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; padding: 20px; }
        .box { background: #333; padding: 15px; border-radius: 5px; }
        #log { color: #ff0; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h3>Status: <span id="status">Iniciando...</span></h3>
    <p>Seu ID: <b id="my-id">Aguardando...</b></p>
    <input type="text" id="peer-id-input" placeholder="ID do destinatário" style="width:100%; padding:8px;">
    <button id="connect-btn" style="width:100%; padding:8px; margin-top:5px;">Conectar</button>
    <div id="log"></div>
</div>

<script>
    var logEl = document.getElementById('log');
    function log(msg) { logEl.innerHTML += msg + '<br>'; }

    // Verificação de segurança: checar se o PeerJS carregou
    if (typeof Peer === 'undefined') {
        log("ERRO: O motor PeerJS não carregou. Verifique sua internet ou bloqueio da TV.");
    } else {
        var peer = new Peer();
        
        peer.on('open', function(id) {
            document.getElementById('my-id').innerText = id;
            document.getElementById('status').innerText = "Online";
        });

        peer.on('error', function(err) {
            log("Erro de Conexão: " + err.type);
            document.getElementById('status').innerText = "Erro";
        });

        document.getElementById('connect-btn').onclick = function() {
            var id = document.getElementById('peer-id-input').value;
            var conn = peer.connect(id);
            conn.on('open', function() { log("Conectado com sucesso!"); });
            conn.on('error', function(e) { log("Falha na conexão: " + e); });
        };
    }
</script>

</body>
</html>
