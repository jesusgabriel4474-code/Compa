<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV OS - Dashboard</title>
    <style>
        /* TEMA: Vermelho, Preto e Borda Branca */
        :root {
            --bg-color: #050505;
            --panel-bg: #120000;
            --primary: #d32f2f;
            --primary-hover: #ff1744;
            --text: #ffffff;
            --border: 1px solid #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* NAVEGAÇÃO DA TV (Foco) */
        .focusable {
            transition: all 0.2s ease;
            outline: none; /* Tira o outline azul padrão */
        }
        .focusable:focus, .focusable.focused {
            background-color: var(--primary-hover) !important;
            border: 2px solid #fff !important;
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--primary-hover);
            z-index: 10;
        }

        /* MENU LATERAL */
        #sidebar {
            width: 250px;
            background-color: var(--panel-bg);
            border-right: var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            position: absolute;
            height: 100%;
            left: -250px; /* Escondido por padrão */
            transition: left 0.3s ease;
            z-index: 100;
        }
        #sidebar.open { left: 0; }
        
        .menu-item {
            padding: 15px 20px;
            margin: 5px 10px;
            background: transparent;
            border: 1px solid transparent;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
        }

        /* ÁREA PRINCIPAL */
        #main-content {
            flex: 1;
            padding: 40px;
            margin-left: 0;
            transition: margin-left 0.3s ease;
            position: relative;
        }
        #main-content.shifted { margin-left: 250px; }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* GRID DE APPS (Início) */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .app-card {
            background: var(--panel-bg);
            border: var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-card img { width: 64px; height: 64px; border-radius: 15px; margin-bottom: 10px; }

        /* ABA VER LINK (Iframe) */
        .link-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] {
            flex: 1; padding: 15px; background: #222; border: var(--border);
            color: white; font-size: 18px;
        }
        button {
            padding: 15px 30px; background: var(--primary); border: var(--border);
            color: white; font-size: 18px; cursor: pointer;
        }
        #browser-frame {
            width: 100%; height: 65vh; border: var(--border); background: #fff; display: none;
        }

        /* MODAIS CUSTOMIZADOS (Avisos e Menus) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8); display: none; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .modal-box {
            background: var(--panel-bg); border: var(--border); padding: 30px;
            border-radius: 10px; text-align: center; min-width: 300px;
        }
        .modal-box button { margin: 10px; width: 100%; }
        
        /* MENU DE CONTEXTO DO APP */
        #context-menu { flex-direction: column; gap: 5px; }

        h1 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="text-align:center; margin-bottom: 20px;">
            <h2 style="color:var(--primary);">TV OS</h2>
        </div>
        <div class="menu-item focusable" onclick="abrirAba('inicio')" id="menu-inicio">🏠 Início</div>
        <div class="menu-item focusable" onclick="abrirAba('ver-link')" id="menu-link">🌐 Ver Link</div>
        <div class="menu-item focusable" onclick="abrirAba('sites')" id="menu-sites">📁 Diretório</div>
        <div class="menu-item focusable" onclick="abrirAba('relogio')" id="menu-relogio">🕒 Relógio (Novo)</div>
    </div>

    <div id="main-content">
        <p style="color: gray; font-size: 14px;">Use as setas do teclado/controle (← ↑ → ↓) e Enter.</p>

        <div id="aba-inicio" class="tab-content active">
            <h1>Meus Aplicativos</h1>
            <button class="focusable" onclick="adicionarNovoApp()" style="margin-bottom: 20px;">+ Adicionar Novo App</button>
            <div class="app-grid" id="lista-apps">
                </div>
        </div>

        <div id="aba-ver-link" class="tab-content">
            <h1>Navegador Embutido</h1>
            <div class="link-box">
                <input type="text" id="url-input" class="focusable" placeholder="Digite o link (ex: https://bing.com)">
                <button class="focusable" onclick="carregarIframe()">Abrir na Caixa</button>
            </div>
            <iframe id="browser-frame" src=""></iframe>
        </div>

        <div id="aba-sites" class="tab-content">
            <h1>Sites Sugeridos</h1>
            <div class="app-grid">
                <div class="app-card focusable" onclick="confirmarRedirecionamento('https://wikipedia.org')">
                    <img src="https://s2.googleusercontent.com/s2/favicons?domain=wikipedia.org&sz=128" alt="Wiki">
                    <span>Wikipedia</span>
                </div>
            </div>
        </div>
        
        <div id="aba-relogio" class="tab-content" style="text-align: center; margin-top: 10vh;">
            <h1 id="tv-clock" style="font-size: 8rem; border:none; margin:0;">00:00</h1>
            <h2 style="color: gray;">Modo Descanso de Tela</h2>
        </div>
    </div>

    <div id="modal-aviso" class="modal-overlay">
        <div class="modal-box">
            <h2 id="modal-titulo">Aviso</h2>
            <p id="modal-texto">Você está saindo do painel da TV.</p>
            <button class="focusable" onclick="fecharModal('modal-aviso')">Cancelar</button>
            <button class="focusable" id="btn-confirmar-modal" style="background: var(--primary-hover);">Continuar</button>
        </div>
    </div>

    <div id="modal-contexto" class="modal-overlay">
        <div class="modal-box" id="context-menu">
            <h3 id="context-app-name" style="margin-top:0;">Opções</h3>
            <button class="focusable" onclick="acaoApp('abrir')">▶ Abrir</button>
            <button class="focusable" onclick="acaoApp('trocar')">🔄 Trocar Link</button>
            <button class="focusable" onclick="acaoApp('flutuante')">🗔 Abrir Aba Flutuante</button>
            <button class="focusable" onclick="acaoApp('deletar')" style="border-color: red;">🗑 Deletar</button>
            <button class="focusable" onclick="fecharModal('modal-contexto')" style="background: #333;">Fechar</button>
        </div>
    </div>

    <script>
        /* 1. GERENCIAMENTO DE ESTADO E LOCALSTORAGE */
        let apps = JSON.parse(localStorage.getItem('tvApps')) || [
            { id: 1, nome: "Google", url: "https://google.com" }
        ];
        let appSelecionadoId = null;

        function salvarApps() {
            localStorage.setItem('tvApps', JSON.stringify(apps));
            renderizarApps();
        }

        /* 2. RENDERIZAÇÃO E ÍCONES ORIGINAIS */
        // Usamos a API nativa do Google para puxar o Favicon (ícone original) de qualquer site
        function obterIcone(url) {
            try {
                let domain = new URL(url).hostname;
                return `https://s2.googleusercontent.com/s2/favicons?domain=${domain}&sz=128`;
            } catch(e) { return 'https://via.placeholder.com/128/000000/FFFFFF?text=App'; }
        }

        function renderizarApps() {
            const grid = document.getElementById('lista-apps');
            grid.innerHTML = '';
            apps.forEach(app => {
                grid.innerHTML += `
                    <div class="app-card focusable" onclick="abrirMenuContexto(${app.id}, '${app.nome}', '${app.url}')">
                        <img src="${obterIcone(app.url)}" alt="${app.nome}">
                        <span>${app.nome}</span>
                    </div>
                `;
            });
            atualizarListaFocaveis();
        }

        /* 3. LÓGICA DAS ABAS */
        function abrirAba(abaId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById('aba-' + abaId).classList.add('active');
            
            // Fecha o menu lateral automaticamente após selecionar
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('main-content').classList.remove('shifted');
            atualizarListaFocaveis();
        }

        /* 4. SISTEMA DE MODAIS (Substituindo Alert/Confirm) */
        function abrirModal(id) {
            document.getElementById(id).style.display = 'flex';
            atualizarListaFocaveis(); // Focar apenas nos botões do modal
            let primeiroBotao = document.getElementById(id).querySelector('.focusable');
            if(primeiroBotao) primeiroBotao.focus();
        }
        
        function fecharModal(id) {
            document.getElementById(id).style.display = 'none';
            appSelecionadoId = null;
            atualizarListaFocaveis();
        }

        function confirmarRedirecionamento(url) {
            document.getElementById('modal-texto').innerText = `Você será redirecionado para: ${url}`;
            document.getElementById('btn-confirmar-modal').onclick = () => window.location.href = url;
            abrirModal('modal-aviso');
        }

        /* 5. MENU DE CONTEXTO DO APP (Clique Direito da TV) */
        function abrirMenuContexto(id, nome, url) {
            appSelecionadoId = id;
            document.getElementById('context-app-name').innerText = nome;
            abrirModal('modal-contexto');
        }

        function acaoApp(acao) {
            const app = apps.find(a => a.id === appSelecionadoId);
            if(!app) return;

            fecharModal('modal-contexto');

            if(acao === 'abrir') {
                window.location.href = app.url;
            } else if (acao === 'deletar') {
                document.getElementById('modal-texto').innerText = `Tem certeza que deseja excluir o app ${app.nome}?`;
                document.getElementById('btn-confirmar-modal').onclick = () => {
                    apps = apps.filter(a => a.id !== appSelecionadoId);
                    salvarApps();
                    fecharModal('modal-aviso');
                    mostrarMensagem("App deletado com sucesso!");
                };
                abrirModal('modal-aviso');
            } else if (acao === 'trocar') {
                // Simplificado para o exemplo, idealmente seria outro modal com input
                let novaUrl = prompt("Digite a nova URL do site (Ex: https://...):", app.url);
                if(novaUrl) {
                    app.url = novaUrl;
                    app.nome = new URL(novaUrl).hostname.replace('www.','');
                    salvarApps();
                }
            } else if (acao === 'flutuante') {
                alert("O sistema de aba flutuante será iniciado aqui! (Requer lógica de drag-and-drop complexa)");
            }
        }

        function adicionarNovoApp() {
            let url = prompt("Digite o link completo do site (Ex: https://youtube.com):");
            if(url) {
                try {
                    let nome = new URL(url).hostname.replace('www.','');
                    apps.push({ id: Date.now(), nome: nome, url: url });
                    salvarApps();
                } catch(e) { mostrarMensagem("URL Inválida. Use http:// ou https://"); }
            }
        }

        function carregarIframe() {
            let url = document.getElementById('url-input').value;
            let frame = document.getElementById('browser-frame');
            if(url) {
                frame.src = url;
                frame.style.display = 'block';
                mostrarMensagem("Carregando site... (Lembre-se que sites grandes bloqueiam iframes)");
            }
        }

        function mostrarMensagem(msg) {
            // Um mini modal temporário para substituir o alert nativo
            document.getElementById('modal-texto').innerText = msg;
            document.getElementById('btn-confirmar-modal').style.display = 'none';
            abrirModal('modal-aviso');
            setTimeout(() => {
                fecharModal('modal-aviso');
                document.getElementById('btn-confirmar-modal').style.display = 'inline-block';
            }, 2500);
        }

        /* 6. NAVEGAÇÃO 100% CONTROLE REMOTO (O Coração da TV) */
        let focusaveis = [];
        let indexFoco = -1;

        function atualizarListaFocaveis() {
            // Pega apenas os elementos focáveis que estão visíveis na tela
            focusaveis = Array.from(document.querySelectorAll('.focusable')).filter(el => {
                return el.offsetWidth > 0 || el.offsetHeight > 0 || el.getClientRects().length > 0;
            });
            if(focusaveis.length > 0) {
                indexFoco = 0;
                focusaveis[indexFoco].focus();
            }
        }

        document.addEventListener('keydown', (e) => {
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('main-content');
            
            // SETA ESQUERDA (←) - Abre o menu lateral
            if (e.key === 'ArrowLeft') {
                if (!sidebar.classList.contains('open')) {
                    sidebar.classList.add('open');
                    main.classList.add('shifted');
                    atualizarListaFocaveis();
                    return;
                }
            }
            
            // SETA DIREITA (→) - Fecha o menu lateral e vai para o conteúdo
            if (e.key === 'ArrowRight' && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                main.classList.remove('shifted');
                atualizarListaFocaveis();
                return;
            }

            // NAVEGAÇÃO BÁSICA ENTRE ELEMENTOS (Cima/Baixo/Dir/Esq na interface)
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault(); // Evita a tela de rolar
                if (focusaveis.length === 0) return;

                if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                    indexFoco = (indexFoco + 1) % focusaveis.length;
                } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                    indexFoco = (indexFoco - 1 + focusaveis.length) % focusaveis.length;
                }
                focusaveis[indexFoco].focus();
            }

            // BOTÃO OK/ENTER
            if (e.key === 'Enter' && focusaveis[indexFoco]) {
                focusaveis[indexFoco].click();
            }
        });

        // Relógio da TV
        setInterval(() => {
            let data = new Date();
            document.getElementById('tv-clock').innerText = data.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // Inicialização
        window.onload = () => {
            renderizarApps();
            document.getElementById('menu-inicio').focus();
        };
    </script>
</body>
</html>
