<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>P2P Connect - Simples</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        #chat-box { height: 200px; border: 1px solid #ccc; overflow-y: scroll; margin: 10px 0; padding: 5px; background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h3>P2P Connect</h3>
    <p>Seu ID: <b id="my-id">Aguardando...</b></p>
    
    <input type="text" id="peer-id-input" placeholder="ID do destinatário">
    <button id="connect-btn">Conectar</button>
    
    <div id="chat-box"></div>
    
    <input type="text" id="message-input" placeholder="Mensagem...">
    <button id="send-btn">Enviar</button>
</div>

<script>
    var peer = new Peer();
    var conn = null;

    peer.on('open', function(id) {
        document.getElementById('my-id').innerText = id;
    });

    peer.on('connection', function(c) {
        conn = c;
        setup();
    });

    document.getElementById('connect-btn').onclick = function() {
        var id = document.getElementById('peer-id-input').value;
        conn = peer.connect(id);
        setup();
    };

    function setup() {
        conn.on('data', function(data) {
            var chat = document.getElementById('chat-box');
            chat.innerHTML += '<p>Eles: ' + data + '</p>';
        });
    }

    document.getElementById('send-btn').onclick = function() {
        var msg = document.getElementById('message-input').value;
        conn.send(msg);
        document.getElementById('chat-box').innerHTML += '<p>Você: ' + msg + '</p>';
        document.getElementById('message-input').value = '';
    };
</script>

</body>
</html>
