<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogo Oficial</title> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-base: #0f1015;
            --bg-panel: #161821;
            --accent: #00e676; /* Um verde gamer vivo, você pode mudar para azul se quiser */
            --accent-hover: #00c853;
            --text-light: #ffffff;
            --text-muted: #8b9bb4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-light); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* PAINEL LATERAL (SIDEBAR) */
        .sidebar {
            width: 260px; background-color: var(--bg-panel); height: 100vh; position: fixed;
            left: 0; top: 0; display: flex; flex-direction: column; padding: 30px 20px;
            border-right: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        .logo { font-size: 22px; font-weight: 800; color: var(--accent); margin-bottom: 50px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .nav-menu { display: flex; flex-direction: column; gap: 15px; }
        .nav-item {
            padding: 15px 20px; border-radius: 12px; color: var(--text-muted); text-decoration: none;
            font-weight: 600; display: flex; align-items: center; gap: 15px; transition: 0.3s; cursor: pointer;
        }
        .nav-item:hover { background-color: rgba(0, 230, 118, 0.1); color: var(--text-light); transform: translateX(5px); }
        .nav-item.ativo { background-color: var(--accent); color: #000; box-shadow: 0 5px 15px rgba(0, 230, 118, 0.3); }

        /* ÁREA PRINCIPAL */
        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .page-title { font-size: 28px; font-weight: 800; }
        
        /* PESQUISA */
        .search-bar { background: var(--bg-panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 10px 20px; display: flex; align-items: center; width: 300px; }
        .search-bar input { background: transparent; border: none; color: white; outline: none; margin-left: 10px; width: 100%; }

        /* GRID DE POSTS */
        .post-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        .card {
            background-color: var(--bg-panel); border-radius: 16px; overflow: hidden; cursor: pointer;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); position: relative;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-color: var(--accent); }
        .card-img { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .card-info { padding: 20px; }
        .card-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; }
        .card-date { font-size: 12px; color: var(--accent); font-weight: 600; }

        /* MODAL (Post Aberto) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999;
            display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--bg-panel); width: 90%; max-width: 800px; height: 85vh; border-radius: 16px;
            overflow-y: auto; position: relative; transform: scale(0.9); transition: 0.3s;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .btn-close { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; z-index: 10; }
        .btn-close:hover { background: var(--accent); color: black; }
        .modal-img { width: 100%; height: 350px; object-fit: cover; }
        .modal-body { padding: 40px; }
        .modal-title { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        .markdown-body { margin-top: 30px; font-size: 16px; line-height: 1.7; color: #ddd; }
        .markdown-body h1, .markdown-body h2 { color: white; margin: 20px 0 10px; }

        /* EMBEDS YT / IMAGENS */
        .embed-container { background: rgba(255,255,255,0.02); border-left: 4px solid var(--accent); padding: 15px; margin: 20px 0; border-radius: 4px; }
        .embed-thumbnail { width: 100%; max-height: 300px; object-fit: cover; border-radius: 8px; margin-top: 10px; cursor: pointer; transition: 0.3s; }
        .embed-thumbnail:hover { opacity: 0.8; }

        /* CHATBOT AI */
        .chat-fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; color: #000; cursor: pointer; box-shadow: 0 5px 20px rgba(0, 230, 118, 0.4); transition: 0.3s; z-index: 1000; }
        .chat-fab:hover { transform: scale(1.1); }
        .chat-window { position: fixed; bottom: 100px; right: 30px; width: 350px; height: 500px; background: var(--bg-panel); border: 1px solid rgba(0, 230, 118, 0.2); border-radius: 16px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 1000; opacity: 0; pointer-events: none; transform: translateY(20px); transition: 0.3s; }
        .chat-window.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .chat-header { background: rgba(0, 230, 118, 0.1); padding: 15px 20px; border-bottom: 1px solid rgba(0, 230, 118, 0.2); display: flex; justify-content: space-between; align-items: center; border-radius: 16px 16px 0 0; }
        .chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
        .msg.bot { background: rgba(255,255,255,0.05); align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.user { background: var(--accent); color: #000; font-weight: 600; align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-input-area { padding: 15px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 10px 15px; color: white; outline: none; }
        .chat-input-area button { background: var(--accent); color: #000; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; }

        .loader { display: none; align-self: flex-start; color: var(--accent); font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo"><i class="fa-solid fa-gamepad"></i> NOME AQUI</div>
        <nav class="nav-menu">
            <div class="nav-item ativo" onclick="mudarAba('tudo', this)"><i class="fa-solid fa-layer-group"></i> Tudo</div>
            <div class="nav-item" onclick="mudarAba('inicio', this)"><i class="fa-solid fa-house"></i> Início</div>
            <div class="nav-item" onclick="mudarAba('atualizacoes', this)"><i class="fa-solid fa-clock-rotate-left"></i> Atualizações</div>
            <div class="nav-item" onclick="mudarAba('proximas', this)"><i class="fa-solid fa-forward-step"></i> Próximas</div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="header-top">
            <h1 class="page-title" id="titulo-aba">Tudo</h1>
            <div class="search-bar">
                <i class="fa-solid fa-search" style="color: var(--text-muted);"></i>
                <input type="text" id="input-pesquisa" placeholder="Pesquisar postagem..." onkeyup="pesquisar()">
            </div>
        </div>

        <div class="post-grid" id="container-posts">
            </div>
        <div id="msg-vazio" style="display:none; text-align:center; margin-top:50px; color:#888;">Nenhuma postagem encontrada.</div>
    </main>

    <div class="modal-overlay" id="modal" onclick="fecharModalBg(event)">
        <div class="modal-content">
            <button class="btn-close" onclick="fecharModal()"><i class="fa-solid fa-xmark"></i></button>
            <img src="" id="modal-img" class="modal-img">
            <div class="modal-body">
                <h1 class="modal-title" id="modal-title">Título</h1>
                <span id="modal-date" style="color: var(--accent); font-weight: bold; font-size: 14px;"></span>
                <div class="markdown-body" id="modal-texto"></div>
            </div>
        </div>
    </div>

    <div class="chat-fab" onclick="toggleChat()"><i class="fa-solid fa-robot"></i></div>
    <div class="chat-window" id="chat-window">
        <div class="chat-header">
            <h3 style="color:white; font-size:16px;"><i class="fa-solid fa-microchip"></i> Assistente IA</h3>
            <i class="fa-solid fa-xmark" style="cursor:pointer; color:white;" onclick="toggleChat()"></i>
        </div>
        <div class="chat-body" id="chat-body">
            <div class="msg bot">Olá! Precisa de ajuda para achar alguma atualização?</div>
            <div class="loader" id="loader">Digitando...</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Pergunte aqui..." onkeypress="if(event.key === 'Enter') enviarMsg()">
            <button onclick="enviarMsg()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // =====================================
        // CONFIGURAÇÃO DA API GEMINI (COLOQUE AQUI)
        // =====================================
        const API_KEY = "SUA_API_AQUI"; 
        const PROMPT_PESSOAL = "Sou o assistente do site. Falo de forma amigável, direta e ajudo o usuário a encontrar as atualizações do jogo postadas no site.";

        // =====================================
        // LÓGICA DO SITE E CONEXÃO COM O ADMIN
        // =====================================
        let postsAtuais = [];
        let abaAtual = 'tudo';

        // Carrega os posts do LocalStorage (onde o Admin salva)
        function carregarPosts() {
            const db = localStorage.getItem('BD_MEUS_POSTS');
            if(db) {
                postsAtuais = JSON.parse(db);
            } else {
                // Se não tiver nada no banco, mostra um post de exemplo
                postsAtuais = [{
                    id: "exemplo", secao: "inicio", Título: "Bem-vindo ao Novo Site!", 
                    Imagem: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070",
                    Data: "Hoje", texto: "O seu painel Admin está funcionando. **Vá até o arquivo admin.html** e crie novas postagens para elas aparecerem aqui!"
                }];
            }
            renderizarPosts();
        }

        // Desenha os cards na tela
        function renderizarPosts(filtroBusca = '') {
            const container = document.getElementById('container-posts');
            container.innerHTML = '';
            let encontrou = false;

            postsAtuais.forEach(post => {
                // Filtra por aba e por texto da pesquisa
                const bateAba = (abaAtual === 'tudo' || post.secao === abaAtual);
                const bateBusca = post.Título.toLowerCase().includes(filtroBusca.toLowerCase()) || post.texto.toLowerCase().includes(filtroBusca.toLowerCase());

                if(bateAba && bateBusca) {
                    encontrou = true;
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => abrirModal(post);
                    card.innerHTML = `
                        <img src="${post.Imagem}" class="card-img">
                        <div class="card-info">
                            <div class="card-title">${post.Título}</div>
                            <div class="card-date">${post.Data} | Aba: ${post.secao.toUpperCase()}</div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });

            document.getElementById('msg-vazio').style.display = encontrou ? 'none' : 'block';
        }

        // Navegação pelo Painel Lateral
        function mudarAba(aba, elemento) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('ativo'));
            elemento.classList.add('ativo');
            abaAtual = aba;
            
            // Muda o título no topo
            const titulos = { 'tudo': 'Todas as Postagens', 'inicio': 'Página Inicial', 'atualizacoes': 'Últimas Atualizações', 'proximas': 'Próximas Novidades' };
            document.getElementById('titulo-aba').innerText = titulos[aba];
            
            document.getElementById('input-pesquisa').value = '';
            renderizarPosts();
        }

        function pesquisar() {
            const termo = document.getElementById('input-pesquisa').value;
            renderizarPosts(termo);
        }

        // =====================================
        // LÓGICA DO MODAL E EMBEDS (YouTube/Imagens)
        // =====================================
        function abrirModal(post) {
            document.getElementById('modal-img').src = post.Imagem;
            document.getElementById('modal-title').innerText = post.Título;
            document.getElementById('modal-date').innerText = post.Data;
            
            let textoProcessado = processarLinks(post.texto);
            document.getElementById('modal-texto').innerHTML = marked.parse(textoProcessado);
            
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function fecharModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = 'auto';
            document.getElementById('modal-texto').innerHTML = ''; // Para pausar vídeos se houver
        }

        function fecharModalBg(e) {
            if(e.target.id === 'modal') fecharModal();
        }

        function processarLinks(texto) {
            const regex = /(https?:\/\/[^\s<]+)/g;
            return texto.replace(regex, function(url) {
                let cleanUrl = url.replace(/[.,;!?]$/, '');
                
                if (cleanUrl.match(/\.(jpeg|jpg|gif|png|webp)(\?.*)?$/i)) {
                    return `<img src="${cleanUrl}" class="embed-thumbnail">`;
                } 
                if (cleanUrl.includes("youtube.com") || cleanUrl.includes("youtu.be")) {
                    let videoId = cleanUrl.includes("v=") ? cleanUrl.split('v=')[1].split('&')[0] : cleanUrl.split('/').pop();
                    return `<div class="embed-container">
                        <strong style="color:var(--accent)"><i class="fa-brands fa-youtube"></i> YouTube Video</strong><br>
                        <a href="${cleanUrl}" target="_blank" style="color:white; text-decoration:none;">Assistir ao vídeo original</a><br>
                        <img src="https://img.youtube.com/vi/${videoId}/hqdefault.jpg" class="embed-thumbnail" onclick="window.open('${cleanUrl}')">
                    </div>`;
                }
                return `<a href="${cleanUrl}" target="_blank" style="color:var(--accent);">${cleanUrl}</a>`;
            });
        }

        // =====================================
        // CHATBOT IA (CORRIGIDO)
        // =====================================
        function toggleChat() {
            document.getElementById('chat-window').classList.toggle('active');
        }

        async function enviarMsg() {
            const input = document.getElementById('chat-input');
            const texto = input.value.trim();
            if(!texto) return;

            const chatBody = document.getElementById('chat-body');
            const loader = document.getElementById('loader');

            // Add mensagem user
            chatBody.insertBefore(criarDivMsg(texto, 'user'), loader);
            input.value = '';
            loader.style.display = 'block';
            chatBody.scrollTop = chatBody.scrollHeight;

            // Prepara as postagens para a IA ler
            const contextoPosts = postsAtuais.map(p => `[${p.secao}] Título: ${p.Título} - Texto: ${p.texto}`).join(" || ");

            const promptFinal = `
                Instruções: ${PROMPT_PESSOAL}. 
                Responda APENAS dúvidas sobre o site e os posts abaixo. Não crie códigos.
                Posts do site: ${contextoPosts}
                
                Pergunta do Usuário: ${texto}
            `;

            try {
                if(API_KEY === "SUA_API_AQUI") throw new Error("API KEY ausente.");

                // Chamada oficial da Gemini REST API
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptFinal }] }]
                    })
                });

                if(!response.ok) throw new Error("Falha na API Gemini. Verifique a chave.");

                const data = await response.json();
                const respostaIA = data.candidates[0].content.parts[0].text;
                
                loader.style.display = 'none';
                chatBody.insertBefore(criarDivMsg(marked.parse(respostaIA), 'bot', true), loader);
                chatBody.scrollTop = chatBody.scrollHeight;

            } catch (err) {
                console.error(err);
                loader.style.display = 'none';
                chatBody.insertBefore(criarDivMsg("Erro ao processar IA. Verifique se a API Key no código está correta.", 'bot'), loader);
                chatBody.scrollTop = chatBody.scrollHeight;
            }
        }

        function criarDivMsg(htmlTexto, tipo, isHtml = false) {
            const div = document.createElement('div');
            div.className = `msg ${tipo}`;
            if(isHtml) div.innerHTML = htmlTexto;
            else div.innerText = htmlTexto;
            return div;
        }

        // Inicializa ao abrir o arquivo
        window.onload = carregarPosts;
    </script>
</body>
</html>
